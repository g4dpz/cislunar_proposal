<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 350" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="750" height="350" fill="#1a1a2e"/>
  
  <!-- Title -->
  <text x="375" y="28" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="bold">Contact Graph Routing — Scheduled Pass Windows</text>
  
  <!-- Time axis -->
  <line x1="120" y1="300" x2="720" y2="300" stroke="#7f8c8d" stroke-width="1.5"/>
  <polygon points="720,300 712,296 712,304" fill="#7f8c8d"/>
  <text x="730" y="304" fill="#7f8c8d" font-size="9">Time</text>
  
  <!-- Time markers -->
  <line x1="180" y1="295" x2="180" y2="305" stroke="#7f8c8d" stroke-width="1"/>
  <text x="180" y="318" text-anchor="middle" fill="#7f8c8d" font-size="8">T+0</text>
  
  <line x1="300" y1="295" x2="300" y2="305" stroke="#7f8c8d" stroke-width="1"/>
  <text x="300" y="318" text-anchor="middle" fill="#7f8c8d" font-size="8">T+20m</text>
  
  <line x1="420" y1="295" x2="420" y2="305" stroke="#7f8c8d" stroke-width="1"/>
  <text x="420" y="318" text-anchor="middle" fill="#7f8c8d" font-size="8">T+90m</text>
  
  <line x1="540" y1="295" x2="540" y2="305" stroke="#7f8c8d" stroke-width="1"/>
  <text x="540" y="318" text-anchor="middle" fill="#7f8c8d" font-size="8">T+95m</text>
  
  <line x1="660" y1="295" x2="660" y2="305" stroke="#7f8c8d" stroke-width="1"/>
  <text x="660" y="318" text-anchor="middle" fill="#7f8c8d" font-size="8">T+180m</text>
  
  <!-- Node labels (Y axis) -->
  <text x="60" y="85" text-anchor="middle" fill="#2ecc71" font-size="10">Station A</text>
  <text x="60" y="100" text-anchor="middle" fill="#7f8c8d" font-size="8">(IO91)</text>
  
  <text x="60" y="165" text-anchor="middle" fill="#f39c12" font-size="10">CubeSat</text>
  <text x="60" y="180" text-anchor="middle" fill="#7f8c8d" font-size="8">(LEO)</text>
  
  <text x="60" y="245" text-anchor="middle" fill="#3498db" font-size="10">Station B</text>
  <text x="60" y="260" text-anchor="middle" fill="#7f8c8d" font-size="8">(JN48)</text>
  
  <!-- Horizontal node lines -->
  <line x1="120" y1="80" x2="720" y2="80" stroke="#2ecc71" stroke-width="0.5" stroke-dasharray="2,4"/>
  <line x1="120" y1="160" x2="720" y2="160" stroke="#f39c12" stroke-width="0.5" stroke-dasharray="2,4"/>
  <line x1="120" y1="240" x2="720" y2="240" stroke="#3498db" stroke-width="0.5" stroke-dasharray="2,4"/>
  
  <!-- Contact window: Station A ↔ CubeSat (Pass 1) -->
  <rect x="160" y="90" width="100" height="60" rx="4" fill="#2ecc71" opacity="0.15" stroke="#2ecc71" stroke-width="1.5"/>
  <text x="210" y="125" text-anchor="middle" fill="#2ecc71" font-size="8" font-weight="bold">Contact 1</text>
  <text x="210" y="138" text-anchor="middle" fill="#2ecc71" font-size="7">8 min window</text>
  
  <!-- Contact window: Station B ↔ CubeSat (Pass 2) -->
  <rect x="400" y="170" width="120" height="60" rx="4" fill="#3498db" opacity="0.15" stroke="#3498db" stroke-width="1.5"/>
  <text x="460" y="205" text-anchor="middle" fill="#3498db" font-size="8" font-weight="bold">Contact 2</text>
  <text x="460" y="218" text-anchor="middle" fill="#3498db" font-size="7">10 min window</text>
  
  <!-- Contact window: Station A ↔ CubeSat (Pass 3) -->
  <rect x="620" y="90" width="80" height="60" rx="4" fill="#2ecc71" opacity="0.15" stroke="#2ecc71" stroke-width="1.5"/>
  <text x="660" y="125" text-anchor="middle" fill="#2ecc71" font-size="8" font-weight="bold">Contact 3</text>
  <text x="660" y="138" text-anchor="middle" fill="#2ecc71" font-size="7">6 min window</text>
  
  <!-- CGR routing path -->
  <path d="M 210 150 L 210 160 L 460 160 L 460 170" stroke="#e74c3c" stroke-width="2" fill="none" marker-end="url(#arrowRed)" stroke-dasharray="6,3"/>
  
  <!-- Bundle flow annotation -->
  <rect x="270" y="42" width="200" height="30" rx="4" fill="#2c3e50" stroke="#e74c3c" stroke-width="1"/>
  <text x="370" y="57" text-anchor="middle" fill="#e74c3c" font-size="9">CGR computed route:</text>
  <text x="370" y="68" text-anchor="middle" fill="#ecf0f1" font-size="8">A → CubeSat (C1) → B (C2)</text>
  
  <!-- Arrow from annotation to path -->
  <line x1="370" y1="72" x2="330" y2="145" stroke="#e74c3c" stroke-width="0.8" stroke-dasharray="2,2"/>
  
  <!-- TLE source note -->
  <text x="375" y="340" text-anchor="middle" fill="#7f8c8d" font-size="9">Contact windows derived from TLE/SGP4 orbital predictions + station coordinates</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#e74c3c"/>
    </marker>
  </defs>
</svg>