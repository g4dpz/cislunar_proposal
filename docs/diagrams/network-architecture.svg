<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="800" height="400" fill="#1a1a2e"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="bold">RADIANT Network Architecture</text>
  
  <!-- Ground segment -->
  <rect x="30" y="280" width="740" height="100" rx="8" fill="#16213e" stroke="#0f3460" stroke-width="1.5"/>
  <text x="400" y="370" text-anchor="middle" fill="#7f8c8d" font-size="11">GROUND SEGMENT</text>
  
  <!-- Mission Ops -->
  <rect x="50" y="300" width="120" height="55" rx="6" fill="#2c3e50" stroke="#3498db" stroke-width="1.5"/>
  <text x="110" y="325" text-anchor="middle" fill="#ecf0f1" font-size="10">Mission</text>
  <text x="110" y="340" text-anchor="middle" fill="#ecf0f1" font-size="10">Operations</text>
  
  <!-- Ground Gateway -->
  <rect x="220" y="300" width="120" height="55" rx="6" fill="#2c3e50" stroke="#2ecc71" stroke-width="1.5"/>
  <text x="280" y="325" text-anchor="middle" fill="#ecf0f1" font-size="10">Ground Gateway</text>
  <text x="280" y="340" text-anchor="middle" fill="#95a5a6" font-size="9">(HDTN Node)</text>
  
  <!-- Ground Station -->
  <rect x="390" y="300" width="120" height="55" rx="6" fill="#2c3e50" stroke="#e67e22" stroke-width="1.5"/>
  <text x="450" y="325" text-anchor="middle" fill="#ecf0f1" font-size="10">Ground Station</text>
  <text x="450" y="340" text-anchor="middle" fill="#95a5a6" font-size="9">Yagi / Dish</text>
  
  <!-- Distributed stations -->
  <rect x="560" y="300" width="120" height="55" rx="6" fill="#2c3e50" stroke="#e67e22" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="620" y="325" text-anchor="middle" fill="#ecf0f1" font-size="10">Distributed</text>
  <text x="620" y="340" text-anchor="middle" fill="#ecf0f1" font-size="10">Stations</text>
  
  <!-- Connections ground -->
  <line x1="170" y1="327" x2="220" y2="327" stroke="#3498db" stroke-width="1.5"/>
  <line x1="340" y1="327" x2="390" y2="327" stroke="#2ecc71" stroke-width="1.5"/>
  <line x1="510" y1="327" x2="560" y2="327" stroke="#e67e22" stroke-width="1.5" stroke-dasharray="4,3"/>
  
  <!-- RF Link (wavy) -->
  <path d="M 450 295 Q 460 250, 450 230 Q 440 210, 450 190 Q 460 170, 450 150" stroke="#e74c3c" stroke-width="2" fill="none" stroke-dasharray="6,3"/>
  <text x="480" y="220" fill="#e74c3c" font-size="9">437 MHz</text>
  <text x="480" y="235" fill="#e74c3c" font-size="9">9.6 kbps</text>
  
  <!-- LEO CubeSat -->
  <rect x="390" y="80" width="120" height="55" rx="6" fill="#1a1a2e" stroke="#f39c12" stroke-width="2"/>
  <text x="450" y="103" text-anchor="middle" fill="#f1c40f" font-size="10" font-weight="bold">LEO CubeSat</text>
  <text x="450" y="118" text-anchor="middle" fill="#95a5a6" font-size="9">DTN Store &amp; Forward</text>
  <text x="450" y="130" text-anchor="middle" fill="#95a5a6" font-size="9">STM32U585</text>
  
  <!-- Cislunar node -->
  <rect x="620" y="60" width="130" height="55" rx="6" fill="#1a1a2e" stroke="#9b59b6" stroke-width="2"/>
  <text x="685" y="83" text-anchor="middle" fill="#bb86fc" font-size="10" font-weight="bold">Cislunar Node</text>
  <text x="685" y="98" text-anchor="middle" fill="#95a5a6" font-size="9">S-band 2.2 GHz</text>
  <text x="685" y="110" text-anchor="middle" fill="#95a5a6" font-size="9">500 bps BPSK</text>
  
  <!-- QO-100 -->
  <rect x="200" y="120" width="120" height="50" rx="6" fill="#1a1a2e" stroke="#1abc9c" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="260" y="143" text-anchor="middle" fill="#1abc9c" font-size="10">QO-100 (GEO)</text>
  <text x="260" y="158" text-anchor="middle" fill="#95a5a6" font-size="9">Phase 1.5 Relay</text>
  
  <!-- Link to QO-100 -->
  <path d="M 280 295 Q 270 240, 265 175" stroke="#1abc9c" stroke-width="1.2" fill="none" stroke-dasharray="4,3"/>
  
  <!-- Link to cislunar -->
  <path d="M 620 300 Q 680 240, 685 120" stroke="#9b59b6" stroke-width="1.5" fill="none" stroke-dasharray="6,3"/>
  <text x="710" y="210" fill="#9b59b6" font-size="9">1.3s delay</text>
  
  <!-- Moon icon -->
  <circle cx="750" y="45" r="18" fill="#34495e" stroke="#7f8c8d" stroke-width="1"/>
  <text x="750" y="50" text-anchor="middle" fill="#bdc3c7" font-size="8">☽</text>
  
  <!-- Legend -->
  <text x="50" y="60" fill="#7f8c8d" font-size="9">── Active link</text>
  <text x="50" y="75" fill="#7f8c8d" font-size="9">╌╌ Planned / future</text>
</svg>