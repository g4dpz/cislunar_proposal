<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="700" height="380" fill="#1a1a2e"/>
  
  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="bold">Link Budget Comparison Across Phases</text>
  
  <!-- Table header -->
  <rect x="40" y="50" width="620" height="30" rx="4" fill="#0f3460"/>
  <text x="120" y="70" text-anchor="middle" fill="#ecf0f1" font-size="10" font-weight="bold">Parameter</text>
  <text x="280" y="70" text-anchor="middle" fill="#2ecc71" font-size="10" font-weight="bold">LEO CubeSat</text>
  <text x="430" y="70" text-anchor="middle" fill="#1abc9c" font-size="10" font-weight="bold">GEO (QO-100)</text>
  <text x="580" y="70" text-anchor="middle" fill="#9b59b6" font-size="10" font-weight="bold">Cislunar</text>
  
  <!-- Rows -->
  <!-- Frequency -->
  <rect x="40" y="85" width="620" height="28" rx="2" fill="#16213e"/>
  <text x="120" y="103" text-anchor="middle" fill="#95a5a6" font-size="9">Frequency</text>
  <text x="280" y="103" text-anchor="middle" fill="#ecf0f1" font-size="9">437 MHz</text>
  <text x="430" y="103" text-anchor="middle" fill="#ecf0f1" font-size="9">10 GHz</text>
  <text x="580" y="103" text-anchor="middle" fill="#ecf0f1" font-size="9">2.2 GHz (S-band)</text>
  
  <!-- Data Rate -->
  <rect x="40" y="117" width="620" height="28" rx="2" fill="#1a1a2e"/>
  <text x="120" y="135" text-anchor="middle" fill="#95a5a6" font-size="9">Data Rate</text>
  <text x="280" y="135" text-anchor="middle" fill="#ecf0f1" font-size="9">9.6 kbps</text>
  <text x="430" y="135" text-anchor="middle" fill="#ecf0f1" font-size="9">~2.4 kbps</text>
  <text x="580" y="135" text-anchor="middle" fill="#ecf0f1" font-size="9">500 bps</text>
  
  <!-- TX Power -->
  <rect x="40" y="149" width="620" height="28" rx="2" fill="#16213e"/>
  <text x="120" y="167" text-anchor="middle" fill="#95a5a6" font-size="9">TX Power</text>
  <text x="280" y="167" text-anchor="middle" fill="#ecf0f1" font-size="9">2 W</text>
  <text x="430" y="167" text-anchor="middle" fill="#ecf0f1" font-size="9">~1 W (uplink)</text>
  <text x="580" y="167" text-anchor="middle" fill="#ecf0f1" font-size="9">5 W</text>
  
  <!-- Ground Antenna -->
  <rect x="40" y="181" width="620" height="28" rx="2" fill="#1a1a2e"/>
  <text x="120" y="199" text-anchor="middle" fill="#95a5a6" font-size="9">Ground Antenna</text>
  <text x="280" y="199" text-anchor="middle" fill="#ecf0f1" font-size="9">12 dBi Yagi</text>
  <text x="430" y="199" text-anchor="middle" fill="#ecf0f1" font-size="9">~30 dBi dish</text>
  <text x="580" y="199" text-anchor="middle" fill="#ecf0f1" font-size="9">35 dBi (3–5m dish)</text>
  
  <!-- One-way delay -->
  <rect x="40" y="213" width="620" height="28" rx="2" fill="#16213e"/>
  <text x="120" y="231" text-anchor="middle" fill="#95a5a6" font-size="9">One-way Delay</text>
  <text x="280" y="231" text-anchor="middle" fill="#ecf0f1" font-size="9">~3 ms</text>
  <text x="430" y="231" text-anchor="middle" fill="#ecf0f1" font-size="9">~250 ms</text>
  <text x="580" y="231" text-anchor="middle" fill="#ecf0f1" font-size="9">~1.3 s</text>
  
  <!-- Margin bar chart -->
  <text x="350" y="275" text-anchor="middle" fill="#e0e0e0" font-size="12" font-weight="bold">Link Margin</text>
  
  <!-- LEO bar -->
  <rect x="200" y="290" width="160" height="30" rx="4" fill="#2ecc71" opacity="0.8"/>
  <text x="280" y="310" text-anchor="middle" fill="#1a1a2e" font-size="11" font-weight="bold">&gt;30 dB</text>
  <text x="280" y="330" text-anchor="middle" fill="#2ecc71" font-size="9">LEO — Very comfortable</text>
  
  <!-- GEO bar -->
  <rect x="200" y="340" width="80" height="30" rx="4" fill="#1abc9c" opacity="0.8"/>
  <text x="240" y="360" text-anchor="middle" fill="#1a1a2e" font-size="11" font-weight="bold">~15 dB</text>
  <text x="320" y="360" text-anchor="middle" fill="#1abc9c" font-size="9">GEO — Good</text>
  
  <!-- Cislunar bar -->
  <rect x="200" y="340" width="0" height="0"/>
  <rect x="200" y="290" width="0" height="0"/>
  
  <!-- Redraw cislunar below -->
  <rect x="40" y="245" width="620" height="28" rx="2" fill="#1a1a2e"/>
  <text x="120" y="263" text-anchor="middle" fill="#95a5a6" font-size="9" font-weight="bold">Link Margin</text>
  <text x="280" y="263" text-anchor="middle" fill="#2ecc71" font-size="10" font-weight="bold">&gt;30 dB</text>
  <text x="430" y="263" text-anchor="middle" fill="#1abc9c" font-size="10" font-weight="bold">~15 dB</text>
  <text x="580" y="263" text-anchor="middle" fill="#e74c3c" font-size="10" font-weight="bold">~7 dB</text>
  
  <!-- Visual margin bars -->
  <text x="120" y="305" text-anchor="middle" fill="#7f8c8d" font-size="9">Margin visualised:</text>
  
  <!-- LEO bar -->
  <rect x="210" y="290" width="140" height="20" rx="3" fill="#2ecc71" opacity="0.7"/>
  <text x="280" y="304" text-anchor="middle" fill="#1a1a2e" font-size="9" font-weight="bold">&gt;30 dB</text>
  
  <!-- GEO bar -->
  <rect x="380" y="290" width="100" height="20" rx="3" fill="#1abc9c" opacity="0.7"/>
  <text x="430" y="304" text-anchor="middle" fill="#1a1a2e" font-size="9" font-weight="bold">~15 dB</text>
  
  <!-- Cislunar bar -->
  <rect x="545" y="290" width="47" height="20" rx="3" fill="#e74c3c" opacity="0.7"/>
  <text x="580" y="304" text-anchor="middle" fill="#ecf0f1" font-size="9" font-weight="bold">7 dB</text>
  
  <!-- Modulation -->
  <rect x="40" y="320" width="620" height="28" rx="2" fill="#16213e"/>
  <text x="120" y="338" text-anchor="middle" fill="#95a5a6" font-size="9">Modulation</text>
  <text x="280" y="338" text-anchor="middle" fill="#ecf0f1" font-size="9">GMSK / BPSK</text>
  <text x="430" y="338" text-anchor="middle" fill="#ecf0f1" font-size="9">SSB (NB transponder)</text>
  <text x="580" y="338" text-anchor="middle" fill="#ecf0f1" font-size="9">BPSK + LDPC/Turbo</text>
  
  <!-- FEC -->
  <rect x="40" y="352" width="620" height="28" rx="2" fill="#1a1a2e"/>
  <text x="120" y="370" text-anchor="middle" fill="#95a5a6" font-size="9">FEC</text>
  <text x="280" y="370" text-anchor="middle" fill="#ecf0f1" font-size="9">Optional</text>
  <text x="430" y="370" text-anchor="middle" fill="#ecf0f1" font-size="9">—</text>
  <text x="580" y="370" text-anchor="middle" fill="#ecf0f1" font-size="9">LDPC / Turbo (essential)</text>
</svg>