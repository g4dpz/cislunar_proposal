<VirtualHost *:80>
    ServerName cislunar-project.amsat-uk.org
    RewriteEngine On
    RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName cislunar-project.amsat-uk.org

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/cislunar-project.amsat-uk.org/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/cislunar-project.amsat-uk.org/privkey.pem

    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:10090/
    ProxyPassReverse / http://127.0.0.1:10090/

    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-For "%{REMOTE_ADDR}s"

    ErrorLog ${APACHE_LOG_DIR}/radiant-error.log
    CustomLog ${APACHE_LOG_DIR}/radiant-access.log combined
</VirtualHost>
